<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简记账</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ionicons for beautiful simple icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app" class="app-container">
        <!-- Header (Only visible on Details Tab) -->
        <header class="top-header" id="topHeader">
            <div class="header-content">
                <!-- Left: Calendar info -->
                <div class="header-left">
                    <div class="calendar-icon" id="dateSelector">
                        <!-- Native date input hidden over the icon (selects exact day, but we only use YYYY-MM for header view) -->
                        <input type="month" id="nativeDateInput" class="hidden-date-input">

                        <ion-icon name="calendar-outline"></ion-icon>
                        <div class="cal-date">
                            <span class="cal-year" id="displayYear">2026</span>
                            <span class="cal-month-day" id="displayMonth">03月</span>
                        </div>
                    </div>
                </div>

                <!-- Vertical divider (Black) -->
                <div class="divider-vertical"></div>

                <!-- Right: Income & Expense rows -->
                <div class="header-right">
                    <div class="summary-row">
                        <span class="label">月收入</span>
                        <span class="value" id="topIncomeValue">0.00</span>
                    </div>
                    <div class="divider-horizontal"></div>
                    <div class="summary-row">
                        <span class="label">月支出</span>
                        <span class="value" id="topExpenseValue">0.00</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area: Tabs -->
        <main class="main-content">
            <!-- 1. Details Tab (Default Active) -->
            <div id="tab-details" class="tab-pane active">
                <div class="transaction-list" id="transactionList">
                    <!-- Rendered by JS -->
                </div>
            </div>

            <!-- 2. Charts Tab -->
            <div id="tab-charts" class="tab-pane" style="padding: 15px 0;">
                <!-- 时间维度切换器 (大圆角居中) -->
                <div class="timeframe-selector">
                    <button class="time-btn active" data-time="week">周</button>
                    <button class="time-btn" data-time="month">月</button>
                    <button class="time-btn" data-time="quarter">季</button>
                    <button class="time-btn" data-time="year">年</button>
                </div>
                
                <!-- 次级时间横向滑动栏 (本周、上周等) -->
                <div id="subTimeScroll" class="sub-time-scroll-container">
                    <!-- 动态生成 -->
                </div>

                <!-- 统计汇总卡片 -->
                <div class="statistics-summary">
                    <div class="stat-item">
                        <span class="stat-label">总支出</span>
                        <span class="stat-value expense" id="totalRangeExpense">0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">总收入</span>
                        <span class="stat-value income" id="totalRangeIncome">0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">结余</span>
                        <span class="stat-value balance" id="totalRangeBalance">0.00</span>
                    </div>
                </div>

                <!-- 图表容器 -->
                <div style="padding: 0 15px;">
                    <div class="chart-header-toggle">
                        <h3 class="chart-title active" data-type="expense" id="pieToggleExpense">支出分类占比</h3>
                        <h3 class="chart-title" data-type="income" id="pieToggleIncome">收入分类占比</h3>
                    </div>
                    <div id="expensePieChart" class="chart-container"></div>
                    
                    <h3 class="chart-title" style="margin-top: 20px;">结余趋势</h3>
                    <div id="trendChart" class="chart-container"></div>

                    <!-- 支出排行榜 -->
                    <div class="ranking-section" style="margin-top: 30px; margin-bottom: 30px;">
                        <div class="chart-header-toggle" style="margin-bottom: 12px;">
                            <h3 class="chart-title active" data-type="expense" id="rankToggleExpense">支出排行榜</h3>
                            <h3 class="chart-title" data-type="income" id="rankToggleIncome">收入排行榜</h3>
                        </div>
                        <div id="categoryRankingList" class="ranking-list">
                            <!-- 动态渲染 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. Assets Tab -->
            <div id="tab-assets" class="tab-pane">
                <!-- 资产总览卡片 -->
                <div class="assets-overview" id="assetsOverview">
                    <!-- 动态渲染 -->
                </div>

                <!-- 账户列表 -->
                <div class="account-list-container" id="accountList">
                    <!-- 动态渲染 -->
                </div>

                <!-- 添加资产按钮容器 -->
                <div class="add-account-container">
                    <button class="add-account-btn" id="addAccountBtn">
                        <ion-icon name="add-outline"></ion-icon>
                        <span>添加资产</span>
                    </button>
                </div>
            </div>

            <!-- 资产详情页 (全屏覆盖层) -->
            <div id="assetDetailsPage" class="full-page-overlay hidden">
                <header class="sub-header black-white">
                    <button id="closeAssetDetails" class="icon-btn"><ion-icon name="arrow-back-outline"></ion-icon></button>
                    <div class="header-title">资产详情</div>
                    <div class="header-right-actions">
                        <button class="icon-btn"><ion-icon name="ellipsis-horizontal"></ion-icon></button>
                    </div>
                </header>
                
                <div class="overlay-content scrollable">
                    <!-- 资产卡片动态渲染 -->
                    <div id="assetDetailCardContainer"></div>

                    <!-- 收支明细列表 -->
                    <div class="detail-section">
                        <div class="section-header">
                            <span>收支明细</span>
                            <div class="month-selector-small">
                                <span id="assetDetailMonth">2026年03月</span>
                                <ion-icon name="caret-down-outline"></ion-icon>
                            </div>
                        </div>
                        <div id="assetTransactionList" class="asset-transaction-list">
                            <!-- 动态渲染 -->
                        </div>
                    </div>
                </div>

                <!-- 底部操作栏 -->
                <div class="asset-footer-actions">
                    <button class="footer-action-item delete" id="deleteAssetBtn">
                        <ion-icon name="trash-outline"></ion-icon>
                        <span>删除资产</span>
                    </button>
                    <div class="action-divider"></div>
                    <button class="footer-action-item" id="adjustBalanceBtnFooter">
                        <ion-icon name="options-outline"></ion-icon>
                        <span>调整余额</span>
                    </button>
                </div>
            </div>

            <!-- 5. Mine Tab -->
            <div id="tab-mine" class="tab-pane">
                <!-- User Profile Header -->
                <div class="mine-header" id="editProfileBtn" style="cursor: pointer; position: relative;">
                    <div class="user-avatar" id="userAvatarContainer">
                        <ion-icon name="happy-outline"></ion-icon>
                    </div>
                    <div class="user-info">
                        <h2 id="userNameDisplay">极简达人</h2>
                        <p id="userSloganDisplay">简单记账，掌控生活</p>
                    </div>
                    <div style="position: absolute; right: 20px; color: #999;">
                        <ion-icon name="create-outline" style="font-size: 24px;"></ion-icon>
                    </div>
                </div>

                <!-- Statistics Cards -->
                <div class="mine-stats">
                    <div class="stat-card">
                        <div class="stat-num" id="daysUsedCount">0</div>
                        <div class="stat-label">记账天数 (天)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="consecutiveDaysCount">0</div>
                        <div class="stat-label">连续打卡 (天)</div>
                    </div>
                </div>

                <!-- Action Menu -->
                <div class="mine-menu">
                    <div class="menu-item" id="exportDataBtn">
                        <ion-icon name="download-outline"></ion-icon>
                        <span class="menu-text">导出备份账单</span>
                        <ion-icon name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                    </div>
                    <div class="menu-item" id="importDataBtn">
                        <ion-icon name="push-outline"></ion-icon>
                        <span class="menu-text">导入备份账单</span>
                        <ion-icon name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                        <input type="file" id="importFileInput" style="display: none;" accept=".json">
                    </div>
                    <div class="menu-item" id="exchangeRateBtn">
                        <ion-icon name="earth-outline"></ion-icon>
                        <span class="menu-text">外汇汇率设置</span>
                        <span class="menu-val" id="exchangeRateInfo">Loading...</span>
                        <ion-icon name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                    </div>
                    <div class="menu-item" id="dashangBtn">
                        <ion-icon name="heart-outline"></ion-icon>
                        <span class="menu-text">打赏作者</span>
                        <ion-icon name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                    </div>
                </div>
            </div>
        </main>

        <!-- The Add Transaction Modal -->
        <div id="addModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header" id="addModalHeader">
                    <button id="closeModalBtn" class="icon-btn"><ion-icon name="close-outline"></ion-icon></button>
                    <!-- Type Selector (Income/Expense) -->
                    <div class="type-toggle" id="modalTypeToggle">
                        <button class="type-btn active" data-type="expense">支出</button>
                        <button class="type-btn" data-type="income">收入</button>
                    </div>
                    <!-- Empty div to balance flex space -->
                    <div style="width: 32px;"></div>
                </div>

                <div class="modal-body add-tx-body">
                    <!-- Note Input Area -->
                    <div class="note-input-container">
                        <ion-icon name="create-outline"></ion-icon>
                        <input type="text" id="txNote" class="note-input" placeholder="输入备注（可选）..." autocomplete="off">
                    </div>

                    <div class="divider-horizontal" style="margin: 0 0 20px 0;"></div>

                    <!-- Step 1: Category Grid -->
                    <div id="stepCategory">
                        <!-- Category Grid (Expense) -->
                        <div class="category-grid" id="expenseCategories">
                            <!-- 动态渲染 -->
                        </div>

                        <!-- Category Grid (Income) - Hidden by default -->
                        <div class="category-grid hidden" id="incomeCategories">
                            <!-- 动态渲染 -->
                        </div>
                    </div>

                    <!-- Step 2: Amount Input & Keypad (Hidden initially) -->
                    <div id="stepAmount" class="hidden">
                        <div class="amount-display-container">
                            <div class="selected-cat-info" id="backToCatBtn" style="cursor: pointer;" title="点击重选分类">
                                <div class="cat-icon small"><ion-icon id="selectedCatIcon"
                                        name="restaurant-outline"></ion-icon></div>
                                <span id="selectedCatName">餐饮</span>
                                <ion-icon name="chevron-down-outline"
                                    style="font-size: 14px; margin-left: 4px; color: var(--text-secondary);"></ion-icon>
                            </div>
                            <div class="amount-value" id="amountDisplay">0.00</div>
                        </div>

                        <div class="divider-horizontal" style="margin: 15px 0;"></div>

                        <div class="keypad-toolbar">
                            <div class="keypad-date-selector">
                                <input type="date" id="keypadDateInput" class="hidden-date-input">
                                <ion-icon name="calendar-outline"></ion-icon>
                                <span id="keypadDateDisplay">今天</span>
                            </div>
                            <!-- 占位以保持 flex space-between -->
                            <div></div>
                        </div>

                        <div class="keypad-grid" style="grid-auto-rows: 46px;">
                            <button class="key-btn num-key">1</button>
                            <button class="key-btn num-key">2</button>
                            <button class="key-btn num-key">3</button>
                            <button class="key-btn action-key" id="keyDelete"><ion-icon name="backspace-outline"></ion-icon></button>

                            <button class="key-btn num-key">4</button>
                            <button class="key-btn num-key">5</button>
                            <button class="key-btn num-key">6</button>
                            <button class="key-btn action-key num-operator">+</button>

                            <button class="key-btn num-key">7</button>
                            <button class="key-btn num-key">8</button>
                            <button class="key-btn num-key">9</button>
                            <button class="key-btn action-key num-operator">-</button>

                            <button class="key-btn action-key" id="keyClear">C</button>
                            <button class="key-btn num-key">0</button>
                            <button class="key-btn num-key">.</button>
                            <button class="key-btn action-key num-operator">×</button>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button class="key-btn submit-key" id="keySubmitAnother" style="flex: 1; height: 50px;">再记</button>
                            <!-- 编辑模式下专用的删除操作按钮 -->
                            <button class="key-btn" id="keyDeleteTxButton" style="flex: 1; height: 50px; background-color: #ff3b30; color: white; border-radius: 8px; display: none;">删除</button>
                            <button class="key-btn submit-key" id="keySubmit" style="flex: 1; height: 50px;">完成</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- 资产表单模态框 (新增/编辑平衡) -->
        <div id="assetModal" class="modal-overlay">
            <div class="modal-content" style="height: auto; min-height: 40vh;">
                <div class="modal-header">
                    <button id="closeAssetModal" class="icon-btn"><ion-icon name="close-outline"></ion-icon></button>
                    <div id="assetModalTitle">添加资产</div>
                    <div style="width: 32px;"></div>
                </div>
                <div class="modal-body">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 14px; color: #888; margin-bottom: 8px;">资产名称</label>
                        <input type="text" id="assetNameInput" style="width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 16px;" placeholder="例如：招商银行">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 14px; color: #888; margin-bottom: 8px;">资产类型</label>
                        <select id="assetTypeInput" style="width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 16px; background: #fff;">
                            <option value="cash">资金账户 (现金/零钱)</option>
                            <option value="bank" selected>银行卡</option>
                            <option value="virtual">虚拟账户 (支付宝/微信)</option>
                            <option value="credit">负债 (信用卡/花呗)</option>
                            <option value="investment">投资理财</option>
                            <option value="foreign_exchange">外汇 (港美股/加密货币)</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 30px;">
                        <label style="display: block; font-size: 14px; color: #888; margin-bottom: 8px;">当前余额</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="assetBalanceInput" step="0.01" style="flex: 1; min-width: 0; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 16px;" placeholder="0.00">
                            <select id="assetCurrencyInput" style="display: none; width: 90px; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 16px; background: #fff;">
                                <option value="CNY">CNY</option>
                                <option value="HKD">HKD</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                    </div>
                    <button id="saveAssetBtn" style="width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700;">保存</button>
                </div>
            </div>
        </div>

        <!-- 编辑个人信息模态框 -->
        <div id="profileModal" class="modal-overlay">
            <div class="modal-content" style="height: auto; min-height: 30vh;">
                <div class="modal-header">
                    <button id="closeProfileModal" class="icon-btn"><ion-icon name="close-outline"></ion-icon></button>
                    <div class="header-title">编辑个人资料</div>
                    <div style="width: 32px;"></div>
                </div>
                <div class="modal-body">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 14px; color: #888; margin-bottom: 8px;">头像 (仅支持输入1个Emoji表情)</label>
                        <input type="text" id="avatarInput" maxlength="2" style="width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 24px; text-align: center;">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 14px; color: #888; margin-bottom: 8px;">昵称</label>
                        <input type="text" id="nameInput" style="width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 16px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 30px;">
                        <label style="display: block; font-size: 14px; color: #888; margin-bottom: 8px;">个性签名</label>
                        <input type="text" id="sloganInput" style="width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 16px;">
                    </div>
                    <button id="saveProfileBtn" style="width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700;">保存资料</button>
                </div>
            </div>
        </div>

        <!-- 外汇设置模态框 -->
        <div id="exchangeRateModal" class="modal-overlay">
            <div class="modal-content" style="height: auto; min-height: 40vh;">
                <div class="modal-header">
                    <button id="closeExchangeRateModal" class="icon-btn"><ion-icon name="close-outline"></ion-icon></button>
                    <div class="header-title">配置参考汇率</div>
                    <button id="autoUpdateRateBtn" class="text-btn" style="font-size: 14px; font-weight: 600; color: #000;">自动获取</button>
                </div>
                <div class="modal-body">
                    <p style="font-size: 13px; color: #666; margin-bottom: 20px;">设置对应人民币 (CNY) 的大致汇率。<br>例如：1 USD = 7.20 CNY。此汇率将用于总资产的粗略折算。</p>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 14px; color: #888; margin-bottom: 8px;">美元 (USD) 汇率</label>
                        <input type="number" id="usdRateInput" step="0.0001" style="width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 16px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 30px;">
                        <label style="display: block; font-size: 14px; color: #888; margin-bottom: 8px;">港币 (HKD) 汇率</label>
                        <input type="number" id="hkdRateInput" step="0.0001" style="width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 8px; font-size: 16px;">
                    </div>
                    <button id="saveExchangeRateBtn" style="width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700;">保存设置</button>
                    <p id="rateUpdateStatus" style="font-size: 12px; color: #666; text-align: center; margin-top: 15px; height: 16px;"></p>
                </div>
            </div>
        </div>

        <!-- 打赏作者模态框 -->
        <div id="dashangModal" class="modal-overlay" style="display: flex; align-items: center; justify-content: center;">
            <div class="modal-content" style="height: auto; max-width: 90vw; padding: 0; background: transparent; box-shadow: none;">
                <div style="position: relative; display: inline-block;">
                    <button id="closeDashangModal" class="icon-btn" style="position: absolute; top: -10px; right: -10px; background: rgba(255,255,255,0.9); border-radius: 50%; width: 36px; height: 36px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
                        <ion-icon name="close-outline" style="color: #333;"></ion-icon>
                    </button>
                    <img src="dashang.jpg" alt="打赏作者" style="width: 100%; max-width: 350px; border-radius: 12px; display: block;">
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-tab="tab-details">
                <ion-icon name="reader-outline"></ion-icon>
                <span>明细</span>
            </a>
            <a href="#" class="nav-item" data-tab="tab-charts">
                <ion-icon name="pie-chart-outline"></ion-icon>
                <span>图表</span>
            </a>
            <div class="nav-item fab-container" id="fabBtn">
                <button class="fab-button">
                    <ion-icon name="add-outline"></ion-icon>
                </button>
                <span>记账</span>
            </div>
            <a href="#" class="nav-item" data-tab="tab-assets">
                <ion-icon name="wallet-outline"></ion-icon>
                <span>资产</span>
            </a>
            <a href="#" class="nav-item" data-tab="tab-mine">
                <ion-icon name="person-outline"></ion-icon>
                <span>我的</span>
            </a>
        </nav>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
