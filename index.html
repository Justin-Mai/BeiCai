<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简记账</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ionicons for beautiful simple icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app" class="app-container">
        <!-- Header (Only visible on Details Tab) -->
        <header class="top-header" id="topHeader">
            <div class="header-content">
                <!-- Left: Calendar info -->
                <div class="header-left">
                    <div class="calendar-icon" id="dateSelector">
                        <!-- Native date input hidden over the icon (selects exact day, but we only use YYYY-MM for header view) -->
                        <input type="month" id="nativeDateInput" class="hidden-date-input">

                        <ion-icon name="calendar-outline"></ion-icon>
                        <div class="cal-date">
                            <span class="cal-year" id="displayYear">2026</span>
                            <span class="cal-month-day" id="displayMonth">03月</span>
                        </div>
                    </div>
                </div>

                <!-- Vertical divider (Black) -->
                <div class="divider-vertical"></div>

                <!-- Right: Income & Expense rows -->
                <div class="header-right">
                    <div class="summary-row">
                        <span class="label">月收入</span>
                        <span class="value" id="topIncomeValue">0.00</span>
                    </div>
                    <div class="divider-horizontal"></div>
                    <div class="summary-row">
                        <span class="label">月支出</span>
                        <span class="value" id="topExpenseValue">0.00</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area: Tabs -->
        <main class="main-content">
            <!-- 1. Details Tab (Default Active) -->
            <div id="tab-details" class="tab-pane active">
                <div class="transaction-list" id="transactionList">
                    <!-- Rendered by JS -->
                </div>
            </div>

            <!-- 2. Charts Tab -->
            <div id="tab-charts" class="tab-pane" style="padding: 15px 0;">
                <!-- 时间维度切换器 (大圆角居中) -->
                <div class="timeframe-selector">
                    <button class="time-btn active" data-time="week">周</button>
                    <button class="time-btn" data-time="month">月</button>
                    <button class="time-btn" data-time="quarter">季</button>
                    <button class="time-btn" data-time="year">年</button>
                </div>
                
                <!-- 次级时间横向滑动栏 (本周、上周等) -->
                <div id="subTimeScroll" class="sub-time-scroll-container">
                    <!-- 动态生成 -->
                </div>

                <!-- 统计汇总卡片 -->
                <div class="statistics-summary">
                    <div class="stat-item">
                        <span class="stat-label">总支出</span>
                        <span class="stat-value expense" id="totalRangeExpense">0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">总收入</span>
                        <span class="stat-value income" id="totalRangeIncome">0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">结余</span>
                        <span class="stat-value balance" id="totalRangeBalance">0.00</span>
                    </div>
                </div>

                <!-- 图表容器 -->
                <div style="padding: 0 15px;">
                    <div class="chart-header-toggle">
                        <h3 class="chart-title active" data-type="expense" id="pieToggleExpense">支出分类占比</h3>
                        <h3 class="chart-title" data-type="income" id="pieToggleIncome">收入分类占比</h3>
                    </div>
                    <div id="expensePieChart" class="chart-container"></div>
                    
                    <h3 class="chart-title" style="margin-top: 20px;">结余趋势</h3>
                    <div id="trendChart" class="chart-container"></div>

                    <!-- 支出排行榜 -->
                    <div class="ranking-section" style="margin-top: 30px; margin-bottom: 30px;">
                        <div class="chart-header-toggle" style="margin-bottom: 12px;">
                            <h3 class="chart-title active" data-type="expense" id="rankToggleExpense">支出排行榜</h3>
                            <h3 class="chart-title" data-type="income" id="rankToggleIncome">收入排行榜</h3>
                        </div>
                        <div id="categoryRankingList" class="ranking-list">
                            <!-- 动态渲染 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. Assets Tab -->
            <div id="tab-assets" class="tab-pane">
                <!-- 资产总览卡片 -->
                <div class="assets-overview" id="assetsOverview">
                    <!-- 动态渲染 -->
                </div>

                <!-- 账户列表 -->
                <div class="account-list-container" id="accountList">
                    <!-- 动态渲染 -->
                </div>
            </div>

            <!-- 5. Mine Tab -->
            <div id="tab-mine" class="tab-pane">
                <div class="empty-state">
                    <ion-icon name="person-outline"></ion-icon>
                    <p>我的功能开发中...</p>
                </div>
            </div>
        </main>

        <!-- The Add Transaction Modal -->
        <div id="addModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header" id="addModalHeader">
                    <button id="closeModalBtn" class="icon-btn"><ion-icon name="close-outline"></ion-icon></button>
                    <!-- Type Selector (Income/Expense) -->
                    <div class="type-toggle" id="modalTypeToggle">
                        <button class="type-btn active" data-type="expense">支出</button>
                        <button class="type-btn" data-type="income">收入</button>
                    </div>
                    <!-- Empty div to balance flex space -->
                    <div style="width: 32px;"></div>
                </div>

                <div class="modal-body add-tx-body">
                    <!-- Note Input Area -->
                    <div class="note-input-container">
                        <ion-icon name="create-outline"></ion-icon>
                        <input type="text" id="txNote" class="note-input" placeholder="输入备注（可选）..." autocomplete="off">
                    </div>

                    <div class="divider-horizontal" style="margin: 0 0 20px 0;"></div>

                    <!-- Step 1: Category Grid -->
                    <div id="stepCategory">
                        <!-- Category Grid (Expense) -->
                        <div class="category-grid" id="expenseCategories">
                            <!-- 动态渲染 -->
                        </div>

                        <!-- Category Grid (Income) - Hidden by default -->
                        <div class="category-grid hidden" id="incomeCategories">
                            <!-- 动态渲染 -->
                        </div>
                    </div>

                    <!-- Step 2: Amount Input & Keypad (Hidden initially) -->
                    <div id="stepAmount" class="hidden">
                        <div class="amount-display-container">
                            <div class="selected-cat-info" id="backToCatBtn" style="cursor: pointer;" title="点击重选分类">
                                <div class="cat-icon small"><ion-icon id="selectedCatIcon"
                                        name="restaurant-outline"></ion-icon></div>
                                <span id="selectedCatName">餐饮</span>
                                <ion-icon name="chevron-down-outline"
                                    style="font-size: 14px; margin-left: 4px; color: var(--text-secondary);"></ion-icon>
                            </div>
                            <div class="amount-value" id="amountDisplay">0.00</div>
                        </div>

                        <div class="divider-horizontal" style="margin: 15px 0;"></div>

                        <div class="keypad-toolbar">
                            <div class="keypad-date-selector">
                                <input type="date" id="keypadDateInput" class="hidden-date-input">
                                <ion-icon name="calendar-outline"></ion-icon>
                                <span id="keypadDateDisplay">今天</span>
                            </div>
                            <!-- 占位以保持 flex space-between -->
                            <div></div>
                        </div>

                        <div class="keypad-grid" style="grid-auto-rows: 46px;">
                            <button class="key-btn num-key">1</button>
                            <button class="key-btn num-key">2</button>
                            <button class="key-btn num-key">3</button>
                            <button class="key-btn action-key" id="keyDelete"><ion-icon name="backspace-outline"></ion-icon></button>

                            <button class="key-btn num-key">4</button>
                            <button class="key-btn num-key">5</button>
                            <button class="key-btn num-key">6</button>
                            <button class="key-btn action-key num-operator">+</button>

                            <button class="key-btn num-key">7</button>
                            <button class="key-btn num-key">8</button>
                            <button class="key-btn num-key">9</button>
                            <button class="key-btn action-key num-operator">-</button>

                            <button class="key-btn action-key" id="keyClear">C</button>
                            <button class="key-btn num-key">0</button>
                            <button class="key-btn num-key">.</button>
                            <button class="key-btn action-key num-operator">×</button>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button class="key-btn submit-key" id="keySubmitAnother" style="flex: 1; height: 50px;">再记</button>
                            <!-- 编辑模式下专用的删除操作按钮 -->
                            <button class="key-btn" id="keyDeleteTxButton" style="flex: 1; height: 50px; background-color: #ff3b30; color: white; border-radius: 8px; display: none;">删除</button>
                            <button class="key-btn submit-key" id="keySubmit" style="flex: 1; height: 50px;">完成</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-tab="tab-details">
                <ion-icon name="reader-outline"></ion-icon>
                <span>明细</span>
            </a>
            <a href="#" class="nav-item" data-tab="tab-charts">
                <ion-icon name="pie-chart-outline"></ion-icon>
                <span>图表</span>
            </a>
            <div class="nav-item fab-container" id="fabBtn">
                <button class="fab-button">
                    <ion-icon name="add-outline"></ion-icon>
                </button>
                <span>记账</span>
            </div>
            <a href="#" class="nav-item" data-tab="tab-assets">
                <ion-icon name="wallet-outline"></ion-icon>
                <span>资产</span>
            </a>
            <a href="#" class="nav-item" data-tab="tab-mine">
                <ion-icon name="person-outline"></ion-icon>
                <span>我的</span>
            </a>
        </nav>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
